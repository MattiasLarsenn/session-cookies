<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-light bg-light">
            <a class="navbar-brand" href="/">Home</a>
            <a class="navbar-brand" href="/shop">Shop</a>
            <a class="navbar-brand" href="/basket">
                Basket <span th:text="${'(' + (session.basket != null ? session.basket.size() : 0) + ')'}"></span>
            </a>
        </nav>
        <h1>Session test page</h1>
        <p th:text="${session.message}">Default</p>

        <form th:action="@{/session-set}" method="post">
            <input type="text" name="message" />
            <button type="submit">Send</button>
        </form>

    </div>
</body>
</html>
