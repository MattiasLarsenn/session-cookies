<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-light bg-light">
            <a class="navbar-brand" href="/">Home</a>
            <a class="navbar-brand" href="/shop">Shop</a>
            <a class="navbar-brand" href="/basket">
                Basket <span th:text="${'(' + (session.basket != null ? session.basket.size() : 0) + ')'}"></span>
            </a>
        </nav>
        <table class="table table-striped table-dark">
            <tr>
                <td>Cookie Type</td>
                <td>Price</td>
                <td>Quality</td>
                <td>Remove</td>
            </tr>

            <tr th:each="game : ${games}">
                <td th:text="${game.getName()}"></td>
                <td th:text="${game.getPrice()}"></td>
                <td th:text="${game.getQuality()}"></td>
                <td><a class="btn btn-success" th:href="@{/removeFromBasket(id=${game.getId()})}">Remove From Basket</a></td>
            </tr>
        </table>
        <p th:if="${games.isEmpty()}">Basket is empty</p>
        <p th:if="${!games.isEmpty()}" th:text="${'The total sum will be ' + total}"></p>
        <a class ="btn btn-danger" th:href="@{/emptyBasket}">Empty Basket</a>
    </div>
</body>
</html>
